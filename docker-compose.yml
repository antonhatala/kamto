services:
  php:
    build: .
    volumes:
      - .:/var/www/html
    environment:
      # Debug/Tracy mode is enabled only for APP_ENV=development|local (fail-closed allowlist
      # — see app/Bootstrap.php). Override for a production-like run: APP_ENV=production docker compose up -d
      APP_ENV: ${APP_ENV:-development}
      # Optional — locally the login password hash comes from the gitignored
      # config/config.local.neon instead. On Bunny this env var is what's actually used.
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH:-}

  nginx:
    image: nginx:alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  adminer:
    # Pinned major: unpinned `adminer` resolved to a stale local 4.8.1 image (PHP 7.4).
    image: adminer:5
    ports:
      - "8081:8080"
    volumes:
      # Local SQLite DB. Mounted rw (SQLite needs to create -journal/-wal files next to
      # the db) and OUTSIDE the docroot — adminer's `php -S` would happily serve
      # anything under /var/www/html as a static download. Login: System "SQLite 3",
      # heslo "kamto", Database "/data/kamto.db" (see CLAUDE.md).
      - ./var:/data
      # Passwordless-DB login (SQLite has no credentials; Adminer refuses empty
      # passwords) — entry password "kamto", see the file itself.
      - ./docker/adminer-login.php:/var/www/html/plugins-enabled/login-password-less.php:ro

  # One-shot tooling containers — nothing is required on the host besides Docker.
  #   docker compose run --rm composer install
  #   docker compose run --rm composer require ...
  #   docker compose run --rm node npm install
  #   docker compose run --rm node npm run css
  composer:
    image: composer:2
    profiles: ["tools"]
    volumes:
      - .:/app

  node:
    image: node:24-alpine
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - .:/app

  # E2E (Playwright, real chromium) — pinned to the same version as @playwright/test in
  # tests/e2e/package.json so the pre-installed browsers in the image match (no re-download).
  #   docker compose run --rm e2e   # installs deps on first run, then runs the whole suite
  e2e:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    profiles: ["tools"]
    working_dir: /app/tests/e2e
    volumes:
      - .:/app
    environment:
      # Shares nginx's network namespace (see network_mode below), so nginx's port 80 is
      # reachable as "localhost" from inside this container. Deliberately NOT "http://nginx:80"
      # (the docker-DNS hostname): the Fáze 5 service-worker specs need `navigator.serviceWorker`,
      # which Chromium only exposes in a "secure context" — https, or the browser's built-in
      # loopback exception for "localhost"/127.0.0.1. A plain compose hostname like "nginx" gets
      # neither, so `serviceWorker.register()` would silently be undefined for every test.
      BASE_URL: http://localhost:80
    # See BASE_URL comment above — join nginx's netns instead of the default bridge network so
    # "localhost" resolves to nginx's own listening socket.
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: sh -c "[ -d node_modules ] || npm ci; npx playwright test"
