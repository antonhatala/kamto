services:
  php:
    build:
      context: .
      target: development
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH:-}
      DATABASE_DRIVER: ${DATABASE_DRIVER:-}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_TOKEN: ${DATABASE_TOKEN:-}

  nginx:
    image: nginx:alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  adminer:
    image: adminer:5
    ports:
      - "8081:8080"
    volumes:
      - ./var:/data
      - ./docker/adminer-login.php:/var/www/html/plugins-enabled/login-password-less.php:ro

  composer:
    image: composer:2
    profiles: ["tools"]
    volumes:
      - .:/app

  node:
    image: node:24-alpine
    profiles: ["tools"]
    working_dir: /app
    volumes:
      - .:/app

  e2e:
    image: mcr.microsoft.com/playwright:v1.61.0-noble
    profiles: ["tools"]
    working_dir: /app/tests/e2e
    volumes:
      - .:/app
    environment:
      BASE_URL: http://localhost:80
    network_mode: "service:nginx"
    depends_on:
      - nginx
    command: sh -c "[ -d node_modules ] || npm ci; npx playwright test"
