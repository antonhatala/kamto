name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, sqlite3, mbstring, tokenizer, ctype, simplexml, dom, xml, iconv, fileinfo
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --prefer-dist
      - name: Test (PHPStan + Tester)
        run: composer test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/antonhatala/kamto:latest
            ghcr.io/antonhatala/kamto:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Redeploy on Bunny Magic Containers
        uses: BunnyWay/actions/container-update-image@671d620bdaac002d2aa7f3dd0dda03dd99c5b749
        with:
          api_key: ${{ secrets.BUNNY_API_KEY }}
          app_id: ${{ secrets.BUNNY_APP_ID }}
          container: kamto
          image_tag: ${{ github.sha }}
