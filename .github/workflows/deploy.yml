name: CI & Deploy

# Push na main = full pipeline (test → build image → push GHCR → redeploy Bunny).
# Pull request = jen testy (žádný build/deploy).
on:
  push:
    branches: [main]
  pull_request:

# Serializace deployů: nový push na main POČKÁ, až doběhne rozběhnutý deploy — nepřerušuje ho
# (cancel-in-progress: false = fronta, ne cancel; bezpečnější pro redeploy stejného kontejneru).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

# Default token pro VŠECHNY joby = jen čtení repa (least-privilege); deploy job si scope zvyšuje.
permissions:
  contents: read

jobs:
  # --- Testy: PHPStan + nette/tester (shodné s `composer test`) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, sqlite3, mbstring, tokenizer, ctype, simplexml, dom, xml, iconv, fileinfo
          coverage: none
      - name: Composer install
        run: composer install --no-interaction --prefer-dist
      - name: Test (PHPStan + Tester)
        run: composer test

  # --- Build produkčního image + push do GHCR + redeploy na Bunny (jen main) ---
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push do ghcr.io přes automatický GITHUB_TOKEN (žádný ruční PAT)
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GitHub runnery jsou amd64 → build je nativní (žádná emulace jako lokálně).
      - name: Build & push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/antonhatala/kamto:latest
            ghcr.io/antonhatala/kamto:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Explicitní trigger — pushnout image Bunny nestačí, musí se říct „vytáhni nový tag".
      # api_key/app_id jsou repo secrets (přidáš je ty; já je nikdy nevidím). Container name
      # MUSÍ přesně sedět s názvem kontejneru v Bunny appce (dole v runbooku: `kamto`).
      # Pinnuto na commit SHA (= v0.2.2) místo @main: action vidí BUNNY_API_KEY, takže moving ref
      # by byl supply-chain vektor (bezpečnostní review). SHA bumpuj vědomě při aktualizaci.
      - name: Redeploy on Bunny Magic Containers
        uses: BunnyWay/actions/container-update-image@671d620bdaac002d2aa7f3dd0dda03dd99c5b749
        with:
          api_key: ${{ secrets.BUNNY_API_KEY }}
          app_id: ${{ secrets.BUNNY_APP_ID }}
          container: kamto
          image_tag: ${{ github.sha }}
