# Kamto — CI (Fáze 6). GitLab = hosting zdrojáku + testy. Deploy jde přes `bunny apps deploy`
# (build z Dockerfile přímo na Bunny Magic Containers — Magic Containers GitLab Container Registry
# oficiálně neintegrují, viz docs), takže tady ŽÁDNÝ build/push/deploy job není; ten řeší bunny CLI.

stages:
  - test

# PHPStan (L8) + nette/tester — shodné s `docker compose run --rm composer test`. Credential-independent,
# běží v Dockeru bez tajností. composer:2 image dnes nese PHP 8.5 (shodné s runtime).
test:
  stage: test
  image: composer:2
  script:
    - composer install --no-interaction --prefer-dist
    - composer test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
