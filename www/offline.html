<!DOCTYPE html>
<html lang="cs">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Offline – Kamto</title>
	<meta name="theme-color" content="#ffffff">
	<!--
		Statická, neautentizovaná offline stránka (service worker ji vrací při selhání sítě na
		navigaci). Styl je inline a soběstačný — nesmí záviset na síti ani na přihlášení. Žádné
		uživatelské údaje.
	-->
	<style>
		:root { color-scheme: light; }
		* { box-sizing: border-box; }
		body {
			margin: 0;
			min-height: 100dvh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 1.5rem;
			background: #fafaf9;
			color: #1c1917;
			font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
			-webkit-font-smoothing: antialiased;
		}
		main {
			max-width: 22rem;
			text-align: center;
		}
		.logo {
			width: 3rem;
			height: 3rem;
			margin: 0 auto 1.25rem;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 0.85rem;
			background: #a6501f;
			color: #fff;
			font-weight: 700;
			font-size: 1.1rem;
		}
		h1 { margin: 0 0 0.5rem; font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em; }
		p { margin: 0 0 1.25rem; font-size: 0.9rem; color: #78716c; line-height: 1.5; }
		a {
			display: inline-block;
			padding: 0.6rem 1.1rem;
			border-radius: 0.75rem;
			background: #a6501f;
			color: #fff;
			font-size: 0.875rem;
			font-weight: 600;
			text-decoration: none;
		}
		a:hover { background: #7f3d18; }
		a:focus-visible { outline: 2px solid #c1622e; outline-offset: 2px; }
	</style>
</head>
<body>
	<main>
		<div class="logo" aria-hidden="true">K</div>
		<h1>Jste offline</h1>
		<p>Kamto se teď nepodařilo načíst. Zkontrolujte připojení a zkuste to znovu.</p>
		<a href="/">Zkusit znovu</a>
	</main>
</body>
</html>
