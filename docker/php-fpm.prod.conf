; Kamto — produkční override fpm poolu (jen produkční image, ne dev/base). Base image
; php:8.5-fpm má docker.conf `listen = 9000` = všechna rozhraní; v self-serving kontejneru
; ale nginx volá fpm přes loopback, takže omezíme bind na 127.0.0.1 + allowed_clients.
; Tím není FastCGI :9000 dosažitelný ze sítě (jinak = neautentizované spuštění PHP → RCE).
; Načítá se po docker.conf (abecedně 'zz-' > 'docker') → jeho `listen` přebije.
;
; POZOR: tenhle override je zapojený VÝHRADNĚ v produkčním stage Dockerfile. Dev (samostatný
; nginx kontejner) potřebuje fpm na 0.0.0.0:9000 (cross-container přes `php:9000`), proto se
; do base/development stage NEkopíruje.
[www]
listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1
