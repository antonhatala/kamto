# Kamto — PRODUKČNÍ nginx (self-serving image pro Bunny Magic Containers). Na rozdíl od dev
# (docker/nginx.conf = samostatný nginx kontejner + fastcgi na php:9000) tenhle běží VE STEJNÉM
# kontejneru jako php-fpm (fastcgi na 127.0.0.1:9000, oba řídí supervisord). Poslouchá na
# unprivileged portu 8080 → nepotřebuje root pro bind; Magic Containers na něj routují HTTP.
#
# POZOR (bezpečnostně citlivé): server blok níže (docroot www/, try_files, PWA/hardening lokace)
# MUSÍ zůstat v syncu s docker/nginx.conf. Docroot je jen www/ → app/, config/, migrations/, var/
# nejsou z venku dosažitelné bez ohledu na cestu; .php se pouští jen když soubor existuje.
# Workery jako www-data (sjednoceno s php-fpm) — custom config jinak spadne na compile default
# 'nobody'. Master (bind portu, čtení configu) běží jako root, workery dropnou na www-data.
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	access_log /dev/stdout;

	sendfile on;
	tcp_nopush on;
	server_tokens off;
	# Za Bunny edge chodí requesty s reálnou velikostí těla malé; drž konzervativně.
	client_max_body_size 2m;

	server {
		listen 8080;
		server_name _;
		root /var/www/html/www;
		index index.php;

		location / {
			try_files $uri $uri/ /index.php?$args;
		}

		# Service worker: nikdy necachovat samotný skript (jinak by se aktualizace nechytla).
		location = /sw.js {
			add_header Cache-Control "no-cache";
			try_files $uri =404;
		}

		# Web app manifest: vynutit spec MIME + no-cache (revalidace při změně ikon/scope).
		location = /manifest.json {
			types { }
			default_type application/manifest+json;
			add_header Cache-Control "no-cache";
			try_files $uri =404;
		}

		# Statické assety — cacheovatelné. Ikony/obrázky týden, CSS/JS (app shell) krátce.
		# nosniff i tady: statiku servíruje nginx přímo (mimo Nette http.headers), tak ať má
		# aspoň X-Content-Type-Options. `always` = i na non-2xx. add_header v location bloku
		# NEdědí ze server úrovně, proto se opakuje u každé statické lokace.
		location ~* \.(png|svg|ico|webp)$ {
			add_header Cache-Control "public, max-age=604800";
			add_header X-Content-Type-Options "nosniff" always;
			try_files $uri =404;
		}
		location ~* \.(css|js)$ {
			add_header Cache-Control "public, max-age=3600";
			add_header X-Content-Type-Options "nosniff" always;
			try_files $uri =404;
		}

		location ~ \.php$ {
			# Jen existující .php do fpm — neexistující 404 rovnou (spolu s cgi.fix_pathinfo=0
			# proti PATH_INFO script-guessingu). fpm běží ve stejném kontejneru na loopbacku.
			try_files $uri =404;
			fastcgi_pass 127.0.0.1:9000;
			fastcgi_index index.php;
			include fastcgi_params;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			fastcgi_param DOCUMENT_ROOT $document_root;
			# TLS termuje Bunny edge; k origin containeru chodí requesty čistě HTTP. Bez tohohle
			# Nette (isSecured()=false) skládá http:// odkazy → https návštěvníka 302 propadne na
			# http://, kde prohlížeč zahodí Secure session cookie → rozbitý login. Container je
			# dostupný VÝHRADNĚ přes Bunny HTTPS edge (žádný přímý public port), takže je korektní
			# tvrdit HTTPS=on natvrdo — Nette pak generuje https:// (port bere z Host hlavičky, ne
			# z SERVER_PORT, ověřeno v RequestFactory). Jen produkce; dev jede reálně po http.
			fastcgi_param HTTPS on;
		}
	}
}
