; Kamto — PHP-FPM tweaks on top of php.ini-production (copied in Dockerfile). The
; security-relevant directives below match that template but are pinned explicitly
; (defense-in-depth — nezávislé na tom, který template je zrovna základ).
date.timezone = Europe/Prague

; Errors never go to the response body — locally Tracy renders them (APP_ENV !=
; production => debug mode, see app/Bootstrap.php), on Bunny they belong in the log.
display_errors = Off

; Nette/Latte needs output buffering (session ini touches after template output starts);
; also the php.ini-production value, pinned so it can't regress to the built-in Off.
output_buffering = 4096

; Never guess the script from PATH_INFO (classic nginx+fpm RCE vector when a request
; like /uploads/x.jpg/foo.php reaches fpm). nginx also guards with `try_files $uri =404`.
cgi.fix_pathinfo = 0

; Don't advertise PHP in the X-Powered-By header (Nette's own header is disabled
; in config/config.neon — http.headers).
expose_php = Off
