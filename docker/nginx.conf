# Kamto — local dev vhost. Docroot is www/ only; app/, config/, log/, temp/, migrations/
# etc. sit outside it, so nothing under them is servable no matter the request path —
# nginx's `root` never lets a URI resolve above the directory it points at.
server {
	listen 80;
	server_name _;
	root /var/www/html/www;
	index index.php;

	# Don't leak the nginx version in Server headers / error pages.
	server_tokens off;

	# Static files (css/, js/, manifest.json, ...) are served directly by the first
	# try_files branch; only unmatched paths fall through to the Nette front controller.
	location / {
		try_files $uri $uri/ /index.php?$args;
	}

	# --- PWA (Fáze 5) -----------------------------------------------------------------
	# Service worker: never cache the SW script itself (browser/CDN) — otherwise an
	# updated SW wouldn't be picked up. `no-cache` = revalidate every load. Type comes
	# from mime.types (application/javascript). Exact `=` match wins over the regex below.
	location = /sw.js {
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	# Web app manifest: force the spec MIME `application/manifest+json`. mime.types maps the
	# .json extension to application/json, so an empty `types {}` block clears that mapping
	# for this location and `default_type` then wins.
	location = /manifest.json {
		types { }
		default_type application/manifest+json;
		# no-cache: prohlížeč musí manifest revalidovat (ne servírovat týden starý z .png/.svg
		# pravidla níže) — jinak by změna ikon/scope neprošla, dokud nevyprší max-age.
		add_header Cache-Control "no-cache";
		try_files $uri =404;
	}

	# Static assets — cacheable. Icons/images rarely change → a week. CSS/JS are the app
	# shell (also versioned by the service worker's CACHE_VERSION), kept shorter since they
	# aren't content-hashed. /sw.js and /manifest.json are handled by the exact matches above.
	location ~* \.(png|svg|ico|webp)$ {
		add_header Cache-Control "public, max-age=604800";
		try_files $uri =404;
	}
	location ~* \.(css|js)$ {
		add_header Cache-Control "public, max-age=3600";
		try_files $uri =404;
	}

	location ~ \.php$ {
		# Only hand existing .php files to fpm — nonexistent ones 404 right here
		# (complements cgi.fix_pathinfo=0 against PATH_INFO script-guessing).
		try_files $uri =404;
		fastcgi_pass php:9000;
		fastcgi_index index.php;
		include fastcgi_params;
		fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		fastcgi_param DOCUMENT_ROOT $document_root;
	}
}
